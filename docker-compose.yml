services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8099
      --log-level info
    env_file: .env
    ports:
      - "8099:8099"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: litigation-command-center-api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: >
      celery -A src.infrastructure.queue.celery_app worker
      -Q litigation.ingest,litigation.deadlines,litigation.ai,litigation.monitoring,litigation.analytics
      -c 4 --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: litigation-command-center-worker
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: >
      celery -A src.infrastructure.queue.celery_app beat
      --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litigation_cc
      POSTGRES_USER: lcc
      POSTGRES_PASSWORD: lcc
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lcc -d litigation_cc"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass changeme-redis-secret
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme-redis-secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11499:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    command: >
      celery
      --broker=redis://:changeme-redis-secret@redis:6379/0
      flower --port=5555
    ports:
      - "5599:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9099:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4399:4317"
      - "3299:3200"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3199:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.2.0
    ports:
      - "3099:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  tempo_data:
  grafana_data:
